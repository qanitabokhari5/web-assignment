# This is the CI (Continuous Integration) pipeline file.
# It automatically runs your tests on GitHub every time someone pushes code
# or opens a Pull Request — so you catch broken tests before merging.

name: CI

# When should this pipeline run?
on:
  push:
    # Run on every push to any branch (including main)
    branches:
      - main
      - '**'
  pull_request:
    # Also run when a Pull Request is opened or updated on any branch
    branches:
      - main
      - '**'

# A "job" is a set of steps that run one after another on a fresh machine
jobs:
  test:
    # Use the latest Ubuntu Linux machine provided by GitHub (free for public repos)
    runs-on: ubuntu-latest
    env:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      AUTOMATION_STORE_URL: ${{ secrets.AUTOMATION_STORE_URL }}
      AUTOMATION_STORE_USERNAME: ${{ secrets.AUTOMATION_STORE_USERNAME }}
      AUTOMATION_STORE_PASSWORD: ${{ secrets.AUTOMATION_STORE_PASSWORD }}
      SAUCE_URL: ${{ secrets.SAUCE_URL }}

    steps:
      # Step 1: Download the code from the repository onto the machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Node.js version 24 (runner default is Node 24)
      # Use `npm ci` below which requires a lockfile (package-lock.json) for reproducible installs
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 3: Prepare artifact directories so upload-artifact does not warn if they are created later
      - name: Prepare artifact directories
        run: mkdir -p playwright-report test-results

      # Step 4: Install all project dependencies listed in package.json
      # This also installs Playwright, TypeScript, ESLint and everything else needed
      - name: Install dependencies
        run: npm ci

      # Step 5: Check that all TypeScript code compiles without errors
      # If there is a type error anywhere in the code, this step will fail
      - name: Run TypeScript check
        run: npm run build

      # Step 5: Run all Playwright tests
      # If any test fails, this step fails and GitHub marks the pipeline as failed
      - name: Run Playwright tests
        run: npm test

      # Step 6: Upload the HTML test report so you can view it on GitHub
      # if: always() means this runs even if the tests failed — so you can see what went wrong
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # The name shown in GitHub under the "Artifacts" section of the run
          name: playwright-report
          # The folder to upload — this is where Playwright saves the HTML report
          path: playwright-report

      # Step 7: Upload raw test result files (screenshots, traces) for failed tests
      # Useful for debugging — you can download and open traces with: npx playwright show-trace
      - name: Upload test-results artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          # The folder where Playwright saves screenshots and trace files on failure
          path: test-results
